<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Sign Up — Oral Cancer Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create your account for Oral Cancer Detection">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { 
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        min-height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center;
        padding: 20px;
      }
      .container { 
        max-width: 400px; 
        width: 100%; 
      }
      .card { 
        background: white; 
        padding: 40px; 
        border-radius: 10px; 
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      }
      h2 { 
        color: #333; 
        margin-bottom: 30px; 
        text-align: center;
        font-size: 1.8rem;
        font-weight: 700;
      }
      .form-group { 
        margin-bottom: 20px; 
      }
      label { 
        display: block; 
        margin-bottom: 8px; 
        color: #555; 
        font-weight: 500;
        font-size: 0.95rem;
      }
      input, select { 
        width: 100%; 
        padding: 12px; 
        border: 1px solid #ddd; 
        border-radius: 5px; 
        font-size: 14px; 
        transition: border-color 0.3s, box-shadow 0.3s;
        font-family: inherit;
      }
      input:focus, select:focus { 
        outline: none; 
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      }
      .error { 
        background: #fee; 
        color: #b00020; 
        padding: 12px; 
        border-radius: 5px; 
        margin-bottom: 20px; 
        border-left: 4px solid #b00020;
        font-size: 0.9rem;
        animation: slideDown 0.3s ease-out;
      }
      @keyframes slideDown {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      button { 
        width: 100%; 
        padding: 12px; 
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
        color: white; 
        border: none; 
        border-radius: 5px; 
        font-size: 16px; 
        font-weight: 600; 
        cursor: pointer; 
        transition: opacity 0.3s, transform 0.2s, box-shadow 0.3s;
        margin-top: 8px;
      }
      button:hover { 
        opacity: 0.9;
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
      }
      button:active {
        transform: translateY(0);
      }
      .hint { 
        text-align: center; 
        margin-top: 20px; 
        color: #666; 
        font-size: 0.9rem;
      }
      .hint a { 
        color: #667eea; 
        text-decoration: none;
        font-weight: 600;
        transition: color 0.3s;
      }
      .hint a:hover { 
        text-decoration: underline;
        color: #764ba2;
      }

      /* Responsive Design */
      @media (max-width: 480px) {
        .card {
          padding: 30px 20px;
          border-radius: 8px;
        }
        h2 {
          font-size: 1.5rem;
          margin-bottom: 25px;
        }
        input, select {
          padding: 10px;
          font-size: 16px;
        }
        button {
          padding: 10px;
          font-size: 15px;
          margin-top: 6px;
        }
        .form-group {
          margin-bottom: 15px;
        }
        label {
          font-size: 0.9rem;
          margin-bottom: 6px;
        }
        .error {
          padding: 10px;
          font-size: 0.85rem;
        }
        .hint {
          font-size: 0.85rem;
          margin-top: 15px;
        }
      }

      @media (max-width: 320px) {
        .card {
          padding: 20px 15px;
          border-radius: 8px;
        }
        h2 {
          font-size: 1.3rem;
          margin-bottom: 20px;
        }
        input, select {
          padding: 8px;
          font-size: 15px;
        }
        button {
          padding: 9px;
          font-size: 14px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h2>Create Account</h2>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{{ url_for('signup') }}">
          <div class="form-group">
            <label for="username">Username</label>
            <input id="username" name="username" type="text" autocomplete="username" required>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input id="password" name="password" type="password" autocomplete="new-password" required>
          </div>

          <div class="form-group">
            <label for="role">Select Role</label>
            <select id="role" name="role" required>
              <option value="patient">Patient</option>
              <option value="doctor">Doctor</option>
            </select>
          </div>

          <button type="submit">Sign Up</button>
        </form>

        <p class="hint">
          Already have an account? <a href="{{ url_for('login') }}">Login</a>
        </p>
      </div>
    </div>
  </body>
</html>
